<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
  <title>Pika 内容控制台</title>
  <style>
    :root {
      --bg: #1a1e23;
      --panel: rgba(255,255,255,0.05);
      --panel-2: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.1);
      --text: #e0e6ed;
      --muted: #94a3b8;
      --accent: #00f0ff;
      --accent-2: #b026ff;
      --good: #22c55e;
      --shadow: 0 18px 50px -18px rgba(0,0,0,.55);
      --radius: 20px;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
    }
    body.theme-minimalist {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-2: #f8fafc;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-2: #7c3aed;
      --shadow: 0 10px 30px -18px rgba(0,0,0,.18);
    }
    body.theme-book {
      --bg: #fdfbf7;
      --panel: #f9f6ef;
      --panel-2: #f5f1e8;
      --border: #e6e0d2;
      --text: #2c241b;
      --muted: #5d5446;
      --accent: #a0522d;
      --accent-2: #8b4513;
      --shadow: 0 10px 30px -20px rgba(44,36,27,.18);
      --font-sans: 'Merriweather', Georgia, serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      background-image: radial-gradient(var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    body:not(.theme-minimalist):not(.theme-book)::before {
      content: '';
      position: fixed;
      inset: auto auto 20% -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(0,240,255,.08), transparent 70%);
      pointer-events: none;
      z-index: -1;
    }
    body:not(.theme-minimalist):not(.theme-book)::after {
      content: '';
      position: fixed;
      inset: auto -10% -10% auto;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(176,38,255,.08), transparent 70%);
      pointer-events: none;
      z-index: -1;
    }
    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 120px 24px 72px;
    }
    .hero {
      display: grid;
      grid-template-columns: 1.3fr .7fr;
      gap: 24px;
      margin-bottom: 24px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }
    .hero-main {
      padding: 32px;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 18px;
      font-weight: 700;
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 1.06;
      letter-spacing: -.03em;
    }
    .lead {
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.8;
      white-space: pre-wrap;
    }
    .hero-side {
      padding: 24px;
      display: grid;
      gap: 16px;
      align-content: start;
    }
    .mini {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px;
    }
    .mini-label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .mini-value {
      font-size: .98rem;
      line-height: 1.7;
      white-space: pre-wrap;
    }
    .status-ok { color: var(--good); font-weight: 700; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }
    .panel {
      padding: 24px;
    }
    .panel h2 {
      margin: 0 0 16px;
      font-size: 1rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .section-text {
      white-space: pre-wrap;
      line-height: 1.86;
      color: var(--text);
    }
    .section-text.muted { color: var(--muted); }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }
    .tab {
      appearance: none;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      font: inherit;
      font-size: .95rem;
      transition: .18s ease;
    }
    .tab:hover { border-color: var(--accent); transform: translateY(-1px); }
    .tab.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #081018;
      border-color: transparent;
      font-weight: 700;
    }
    body.theme-minimalist .tab.active,
    body.theme-book .tab.active { color: #fff; }
    .nav-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 14px;
    }
    .nav-link {
      text-decoration: none;
      color: var(--text);
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 16px;
      transition: .2s ease;
    }
    .nav-link:hover { transform: translateY(-3px); border-color: var(--accent); }
    .nav-link strong { display: block; margin-bottom: 6px; }
    .nav-link span { color: var(--muted); font-size: .88rem; line-height: 1.5; }
    .source {
      margin-top: 16px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: .84rem;
      word-break: break-all;
    }
    .loading, .error {
      padding: 24px;
      border-radius: 16px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      white-space: pre-wrap;
      line-height: 1.8;
    }
    .error { color: #ffb4b4; }
    @media (max-width: 900px) {
      .hero, .grid { grid-template-columns: 1fr; }
      .container { padding: 100px 18px 48px; }
      .hero-main, .hero-side, .panel { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <div class="card hero-main">
        <div class="eyebrow">Pika Content Dashboard</div>
        <h1 id="title">Loading…</h1>
        <div class="lead" id="summary">正在读取今天的内容。</div>
        <div class="source" id="sourcePath">source: loading…</div>
      </div>
      <div class="card hero-side">
        <div class="mini">
          <div class="mini-label">当前状态</div>
          <div class="mini-value"><span class="status-ok">● 内容已接入</span>
首页现在直接读 canonical content，不再让你盯 API JSON。</div>
        </div>
        <div class="mini">
          <div class="mini-label">今日核心洞察</div>
          <div class="mini-value" id="insight">Loading…</div>
        </div>
        <div class="mini">
          <div class="mini-label">真实触发</div>
          <div class="mini-value" id="trigger">Loading…</div>
        </div>
      </div>
    </section>

    <section class="grid">
      <div class="card panel">
        <h2>主推正文</h2>
        <div class="section-text" id="mainArticle">Loading…</div>
      </div>
      <div class="card panel">
        <h2>平台成稿切换</h2>
        <div class="tabs" id="platformTabs"></div>
        <div class="section-text" id="platformContent">Loading…</div>
      </div>
    </section>

    <section class="card panel" style="margin-bottom:24px;">
      <h2>查看方式</h2>
      <div class="nav-grid">
        <a class="nav-link" href="doc.html"><strong>文档视图</strong><span>适合完整阅读正文</span></a>
        <a class="nav-link" href="outline.html"><strong>大纲视图</strong><span>看结构和章节脉络</span></a>
        <a class="nav-link" href="card.html"><strong>卡片视图</strong><span>适合拆分平台卡片</span></a>
        <a class="nav-link" href="mindmap.html"><strong>脑图视图</strong><span>看内容骨架和分支</span></a>
        <a class="nav-link" href="presentation.html"><strong>演示视图</strong><span>适合讲述和投屏</span></a>
        <a class="nav-link" href="canvas.html"><strong>Canvas</strong><span>自由布局与后续扩展</span></a>
      </div>
    </section>

    <section class="card panel">
      <h2>调试信息</h2>
      <div class="section-text muted" id="debugInfo">等待内容加载…</div>
    </section>
  </div>

  <script src="../js/runtime.js?v=1"></script>
  <script>
    function cleanBlock(text) {
      return (text || '')
        .replace(/^###\s+/gm, '')
        .replace(/^##\s+/gm, '')
        .replace(/^#\s+/gm, '')
        .trim();
    }

    function parseMarkdown(md) {
      const text = md || '';
      const lines = text.split(/\r?\n/);
      let title = 'Untitled';
      const quote = [];
      for (const line of lines) {
        if (!title && /^#\s+/.test(line)) title = line.replace(/^#\s+/, '').trim();
      }
      const titleLine = lines.find(l => /^#\s+/.test(l));
      if (titleLine) title = titleLine.replace(/^#\s+/, '').trim();
      for (const line of lines) {
        if (/^>\s?/.test(line)) quote.push(line.replace(/^>\s?/, ''));
      }
      const sections = {};
      let current = null;
      for (const line of lines) {
        const m = line.match(/^##\s+(.+)$/);
        if (m) {
          current = m[1].trim();
          sections[current] = [];
          continue;
        }
        if (current) sections[current].push(line);
      }
      Object.keys(sections).forEach(k => sections[k] = cleanBlock(sections[k].join('\n')));
      return { title, quote: quote.join('\n').trim(), sections };
    }

    function pickSection(sections, startsWith) {
      const key = Object.keys(sections).find(k => k.startsWith(startsWith));
      return key ? sections[key] : '';
    }

    function setText(id, value) {
      const el = document.getElementById(id);
      if (el) el.textContent = value || '（暂无内容）';
    }

    function buildTabs(platforms) {
      const wrap = document.getElementById('platformTabs');
      const body = document.getElementById('platformContent');
      wrap.innerHTML = '';
      const entries = Object.entries(platforms).filter(([,v]) => v && v.trim());
      if (!entries.length) {
        body.textContent = '暂无平台成稿';
        return;
      }
      entries.forEach(([label, content], idx) => {
        const btn = document.createElement('button');
        btn.className = 'tab' + (idx === 0 ? ' active' : '');
        btn.textContent = label;
        btn.onclick = () => {
          wrap.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          btn.classList.add('active');
          body.textContent = content;
        };
        wrap.appendChild(btn);
        if (idx === 0) body.textContent = content;
      });
    }

    function renderContent(content, sourceMeta) {
      const debug = document.getElementById('debugInfo');
      try {
        const parsed = parseMarkdown(content || '');
        const trigger = pickSection(parsed.sections, '1. 真实触发');
        const curiosity = pickSection(parsed.sections, '2. 我开始好奇什么');
        const judgment = pickSection(parsed.sections, '3. 一步步推到的判断');
        const insight = pickSection(parsed.sections, '4. 我目前的核心洞察');
        const meaning = pickSection(parsed.sections, '5. 这对普通使用者意味着什么');
        const xhs = pickSection(parsed.sections, '7. 小红书版成稿');
        const wechat = pickSection(parsed.sections, '8. 公众号版成稿');
        const x = pickSection(parsed.sections, '9. X 版成稿');

        setText('title', parsed.title);
        setText('summary', parsed.quote || '今天的内容已加载。');
        if (sourceMeta) {
          setText('sourcePath', 'source: ' + (sourceMeta.path || 'unknown'));
          debug.textContent = [
            'lang: ' + (sourceMeta.lang || 'zh'),
            'path: ' + (sourceMeta.path || 'unknown'),
            'sections: ' + Object.keys(parsed.sections).join(' | ')
          ].join('\n');
        }
        setText('insight', insight);
        setText('trigger', trigger);
        setText('mainArticle', [trigger, curiosity, judgment, insight, meaning].filter(Boolean).join('\n\n'));
        buildTabs({ '小红书': xhs, '公众号': wechat, 'X / Twitter': x });
      } catch (e) {
        document.querySelector('.hero-main').innerHTML = '<div class="error">渲染失败：\n' + String(e) + '</div>';
        if (debug) debug.textContent = 'error: ' + String(e);
        console.error(e);
      }
    }

    async function loadDashboard() {
      try {
        const api = window.selfwareWithLang ? window.selfwareWithLang('/api/content') : '/api/content';
        const res = await fetch(api, { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status + ' ' + api);
        const data = await res.json();
        renderContent(data.content, { lang: data.lang, path: data.path });
      } catch (e) {
        document.querySelector('.hero-main').innerHTML = '<div class="error">首页加载失败：\n' + String(e) + '</div>';
        console.error(e);
      }
    }

    loadDashboard();

    // Re-render immediately when chat edit updates content (no extra fetch)
    window.addEventListener('audp-content-updated', (e) => {
      if (e.detail) renderContent(e.detail);
    });
  </script>
  <script src="../js/view-switcher.js?v=5"></script>
</body>
</html>
