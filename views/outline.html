<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <title>Outline View - Selfware</title>
    <style>
        :root {
            --bg-color: #1a1e23;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-primary: #e0e6ed;
            --text-secondary: #94a3b8;
            --accent-color: #00f0ff;
            --accent-secondary: #b026ff;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --editor-bg: #111418;
            --editor-border: #2d333b;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            margin: 0;
            padding: 0; /* Reset padding for layout */
            display: flex;
            min-height: 100vh;
            overflow: hidden; /* Prevent body scroll, use container scroll */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 240, 255, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(176, 38, 255, 0.1) 0%, transparent 20%);
        }

        /* Layout */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            height: 100vh;
            box-sizing: border-box;
            transition: margin-right 0.3s ease;
        }

        .container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        h1.view-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--accent-color);
        }

        .btn-primary {
            background: rgba(0, 240, 255, 0.15);
            border-color: rgba(0, 240, 255, 0.3);
            color: var(--accent-color);
        }

        .btn-primary:hover {
            background: rgba(0, 240, 255, 0.25);
        }

        /* Outline Styles (Kept from original) */
        .outline-root {
            position: relative;
            padding-left: 20px;
        }

        .outline-root::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, var(--accent-color), var(--accent-secondary));
            border-radius: 2px;
            opacity: 0.3;
        }

        .node {
            margin-bottom: 16px;
            position: relative;
        }

        .node-content {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .node-content:hover {
            transform: translateX(5px);
            border-color: rgba(0, 240, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .level-1 .node-content {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            border-left: 4px solid var(--accent-color);
        }

        .level-2 .node-content {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .level-3 .node-content {
            font-size: 16px;
            font-weight: 400;
            color: var(--text-secondary);
        }

        .level-4 .node-content {
            font-size: 14px;
            font-weight: 400;
            color: #8b9bb4;
            background: transparent;
            border: none;
            padding: 8px 20px;
        }
        .level-4 .node-content:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(3px);
        }
        .level-4::before {
             /* Bullet point style */
             content: "•";
             position: absolute;
             left: 10px;
             top: 12px;
             color: var(--accent-secondary);
             font-size: 18px;
             line-height: 1;
        }
        .level-4 {
            padding-left: 10px; /* Indent for bullet */
        }

        .children {
            margin-left: 40px;
            padding-top: 10px;
            border-left: 1px dashed rgba(255,255,255,0.1);
            padding-left: 20px;
        }

        .badge {
            font-size: 10px;
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: auto;
            color: var(--text-secondary);
            font-family: monospace;
        }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .node { animation: fadeIn 0.4s ease forwards; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent-color);
            color: #000;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            box-shadow: 0 5px 20px rgba(0, 240, 255, 0.4);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
    
    
/* Theme: Minimalist (Modern SaaS) */
body.theme-minimalist {
    --bg-color: #f3f4f6 !important;

    --text-primary: #111827 !important;
    --text-secondary: #6b7280 !important;
    --accent-color: #0f172a !important;
    --accent-secondary: #3b82f6 !important;
    background-image: none !important;
    font-family: 'Inter', sans-serif !important;
}

body.theme-minimalist .node-content {
    background: #ffffff !important;

    box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06) !important;
    backdrop-filter: none !important;
}

body.theme-minimalist .node-content:hover {

    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05) !important;
    background: #ffffff !important;
    transform: translateX(5px);
}

body.theme-minimalist h1.view-title {

}

body.theme-minimalist .level-1 .node-content {
    color: #111827 !important;
    border-left: 4px solid #0f172a !important;
    font-weight: 700 !important;
}

body.theme-minimalist .level-4 .node-content {
    color: #4b5563 !important;
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
}
body.theme-minimalist .level-4 .node-content:hover {
    background: #e5e7eb !important;
    box-shadow: none !important;

body.theme-minimalist .children {
    border-left: 1px solid #e5e7eb !important;
}

/* Theme: Book (Elegant Serif) */
body.theme-book {
    --bg-color: #f2efe9 !important;
    --card-bg: #fdfbf7 !important;
    --text-primary: #2c241b !important;
    --text-secondary: #5d5446 !important;
    --accent-color: #a0522d !important;
    --accent-secondary: #8b4513 !important;
    background-image: none !important;
    font-family: 'Merriweather', serif !important;
}

body.theme-book .node-content {
    background: #fdfbf7 !important;
    border: 1px solid rgba(160, 82, 45, 0.15) !important;
    box-shadow: 0 2px 4px rgba(60, 50, 40, 0.05) !important;
    backdrop-filter: none !important;
}

body.theme-book .node-content:hover {
    border-color: #a0522d !important;
    background: #fff !important;
    box-shadow: 0 8px 20px rgba(60, 50, 40, 0.1) !important;
    transform: translateX(5px);
}

body.theme-book h1.view-title {
    color: #2c241b !important;
    border-bottom: 1px solid rgba(160, 82, 45, 0.15) !important;
    font-family: 'Merriweather', serif !important;
}

body.theme-book .level-1 .node-content {
    color: #2c241b !important;
    border-left: 4px solid #a0522d !important;
    font-family: 'Merriweather', serif !important;
}

body.theme-book .level-2 .node-content,
body.theme-book .level-3 .node-content {
    font-family: 'Georgia', serif !important;
}

body.theme-book .level-4 .node-content {
    color: #5d5446 !important;
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
    font-family: 'Georgia', serif !important;
}
body.theme-book .level-4 .node-content:hover {
    background: rgba(160, 82, 45, 0.05) !important;
    box-shadow: none !important;
}

body.theme-book .children {
    border-left: 1px solid rgba(160, 82, 45, 0.15) !important;
}
</style>
</head>
<body>

<div class="main-content" id="main-content">
    <div class="container">
        <h1 class="view-title" style="justify-content: flex-end;">
            <!-- Title handled by Global Switcher -->
            <!-- Controls handled globally -->
        </h1>

        <div id="outline-container" class="outline-root">
            <!-- Dynamic Content Will Be Rendered Here -->
        </div>
    </div>
</div>

<!-- Editor Sidebar Removed (Use Global) -->

<div id="toast" class="toast">Saved successfully!</div>

<script src="../js/runtime.js?v=1"></script>
<script>
    let currentContent = "";
    const outlineContainer = document.getElementById('outline-container');

    // Initialize: Fetch content from server
    fetch((window.selfwareWithLang ? window.selfwareWithLang('/api/content') : '/api/content'))
        .then(response => {
            if (!response.ok) throw new Error("Network response was not ok");
            return response.json();
        })
        .then(data => {
            currentContent = data.content;
            updateOutline();
        })
        .catch(err => {
            console.error("Failed to load content:", err);
            outlineContainer.innerHTML = '<div style="padding:20px; color:red">Error loading content. Please ensure server.py is running.</div>';
        });

    // Listen for Global Editor Updates
    window.addEventListener('audp-content-updated', (e) => {
        currentContent = e.detail;
        updateOutline();
    });

    // Simple Markdown Parser for Outline
    function parseMarkdown(md) {
        if (!md) return [];
        const lines = md.split('\n');
        const root = { level: 0, children: [] };
        let stack = [root];
        let insideStyle = false;

        lines.forEach(line => {
            const trimmed = line.trim();
            if (!trimmed) return;
            if (insideStyle) {
                if (/^<\/style/i.test(trimmed)) insideStyle = false;
                return;
            }
            if (/^<style[\s>]/i.test(trimmed)) {
                insideStyle = true;
                return;
            }

            let level = 0;
            let content = '';

            if (trimmed.startsWith('# ')) { level = 1; content = trimmed.substring(2); }
            else if (trimmed.startsWith('## ')) { level = 2; content = trimmed.substring(3); }
            else if (trimmed.startsWith('### ')) { level = 3; content = trimmed.substring(4); }
            else if (trimmed.startsWith('- ') || trimmed.startsWith('* ') || trimmed.startsWith('+ ')) { 
                level = 4; 
                content = trimmed.substring(2); 
            } else if (/^\d+[.)]\s+/.test(trimmed)) {
                level = 4;
                content = trimmed.replace(/^\d+[.)]\s+/, '');
            } else {
                // paragraph line
                if (/^-{3,}$/.test(trimmed)) return; // ignore separators like ---
                if (/^<\s*\//.test(trimmed) || /^<\s*[a-z!]/i.test(trimmed)) return; // ignore inline html tags
                if (/^(alt|width|height|style)=/i.test(trimmed)) return; // ignore html attrs from <img ...>
                if (trimmed === '>') return;
                level = 4;
                content = trimmed;
            }

            const node = { level, content, children: [] };

            while (stack.length > 1 && stack[stack.length - 1].level >= level) {
                stack.pop();
            }
            
            stack[stack.length - 1].children.push(node);
            stack.push(node);
        });

        return root.children;
    }

    function renderNode(node, index) {
        const childrenHtml = node.children.length > 0 
            ? `<div class="children">${node.children.map((child, i) => renderNode(child, i)).join('')}</div>`
            : '';

        const delay = index * 0.1;
        const badge = node.level === 4 ? '' : `<span class="badge">H${node.level}</span>`;

        return `
            <div class="node level-${node.level}" style="animation-delay: ${delay}s">
                <div class="node-content">
                    ${node.content}
                    ${badge}
                </div>
                ${childrenHtml}
            </div>
        `;
    }

    function updateOutline() {
        const tree = parseMarkdown(currentContent);
        outlineContainer.innerHTML = tree.map((node, i) => renderNode(node, i)).join('');
    }
</script>

<script src="../js/view-switcher.js?v=5"></script></body>
</html>
