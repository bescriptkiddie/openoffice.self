<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <title>Doc View - Selfware</title>
  <style>
    :root {
      --bg: #1a1e23;
      --panel: rgba(255, 255, 255, 0.05);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text: #e0e6ed;
      --muted: #94a3b8;
      --accent: #00f0ff;
      --accent-2: #b026ff;
      --code-bg: rgba(0, 0, 0, 0.3);
      --border: rgba(255, 255, 255, 0.1);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
      --radius: 16px;
    }

    body.theme-minimalist {
      --bg: #f3f4f6;
      --panel: #ffffff;
      --panel-border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --accent: #0f172a;
      --accent-2: #3b82f6;
      --code-bg: #f9fafb;
      --border: #e5e7eb;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    body.theme-book {
      --bg: #fdfbf7;
      --panel: #fdfbf7;
      --panel-border: #e6e0d2;
      --text: #2c241b;
      --muted: #5d5446;
      --accent: #a0522d;
      --accent-2: #8b4513;
      --code-bg: #f5f2eb;
      --border: #e6e0d2;
      --shadow: none;
      --font-sans: 'Merriweather', 'Georgia', serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      transition: background-color 0.3s ease, color 0.3s ease;
      background-image: radial-gradient(var(--panel-border) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    body:not(.theme-minimalist):not(.theme-book)::before {
      content: '';
      position: fixed;
      top: -20%;
      left: -10%;
      width: 60%;
      height: 60%;
      background: radial-gradient(circle, rgba(0, 240, 255, 0.08), transparent 70%);
      z-index: -1;
      pointer-events: none;
    }
    body:not(.theme-minimalist):not(.theme-book)::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 60%;
      height: 60%;
      background: radial-gradient(circle, rgba(176, 38, 255, 0.08), transparent 70%);
      z-index: -1;
      pointer-events: none;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 120px 24px 80px;
    }

    .doc {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      padding: 48px 56px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      font-size: 1.0625rem;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 768px) {
      .doc { padding: 32px 24px; }
    }

    .top-note {
      text-align: center;
      margin-bottom: 24px;
      color: var(--muted);
      font-size: 0.875rem;
      font-family: var(--font-mono);
      opacity: 0.8;
    }

    .error-box {
      color: #ffb4b4;
      background: rgba(255, 0, 0, 0.08);
      border: 1px solid rgba(255, 0, 0, 0.18);
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 18px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-note">DOC VIEW · canonical source → <code id="canonical-path">content/selfware_demo.md</code></div>
    <div id="status"></div>
    <div class="doc" id="doc">Loading…</div>
  </div>

  <script src="../js/runtime.js?v=1"></script>
  <script>
    async function load() {
      const el = document.getElementById('doc');
      const status = document.getElementById('status');
      try {
        const api = (window.selfwareWithLang ? window.selfwareWithLang('/api/content') : '/api/content');
        const res = await fetch(api, { cache: 'no-store' });
        if (!res.ok) {
          throw new Error('HTTP ' + res.status + ' while requesting ' + api);
        }
        const data = await res.json();
        const md = data && typeof data.content === 'string' ? data.content : '';
        const cp = document.getElementById('canonical-path');
        if (cp && data && typeof data.path === 'string') cp.textContent = data.path;
        el.textContent = md || '(empty content)';
      } catch (e) {
        status.innerHTML = '<div class="error-box">Failed to load content:\n' + String(e) + '</div>';
        el.textContent = 'Failed to load content.';
        console.error(e);
      }
    }
    load();

    // Re-render when chat edit updates content
    window.addEventListener('audp-content-updated', (e) => {
      if (e.detail) {
        const el = document.getElementById('doc');
        if (el) el.textContent = e.detail;
      }
    });
  </script>

  <script src="../js/view-switcher.js?v=5"></script>
</body>
</html>
