<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
  <title>Article View - Selfware</title>
  <style>
    :root {
      --bg: #1a1e23;
      --panel: rgba(255,255,255,0.05);
      --panel-2: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.1);
      --text: #e0e6ed;
      --muted: #94a3b8;
      --accent: #00f0ff;
      --accent-2: #b026ff;
      --code-bg: rgba(0,0,0,0.3);
      --shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
      --radius: 16px;
    }
    body.theme-minimalist {
      --bg: #f3f4f6;
      --panel: #ffffff;
      --panel-2: #f8fafc;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --accent: #0f172a;
      --accent-2: #3b82f6;
      --code-bg: #f9fafb;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }
    body.theme-book {
      --bg: #fdfbf7;
      --panel: #fdfbf7;
      --panel-2: #f5f2eb;
      --border: #e6e0d2;
      --text: #2c241b;
      --muted: #5d5446;
      --accent: #a0522d;
      --accent-2: #8b4513;
      --code-bg: #f5f2eb;
      --shadow: none;
      --font-sans: 'Merriweather', Georgia, serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      background-image: radial-gradient(var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    body:not(.theme-minimalist):not(.theme-book)::before {
      content: '';
      position: fixed;
      top: -20%;
      left: -10%;
      width: 60%;
      height: 60%;
      background: radial-gradient(circle, rgba(0,240,255,0.08), transparent 70%);
      z-index: -1;
      pointer-events: none;
    }
    body:not(.theme-minimalist):not(.theme-book)::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 60%;
      height: 60%;
      background: radial-gradient(circle, rgba(176,38,255,0.08), transparent 70%);
      z-index: -1;
      pointer-events: none;
    }
    .header {
      position: sticky;
      top: 0;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      z-index: 100;
    }
    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      transition: .2s ease;
    }
    .back-btn:hover {
      border-color: var(--accent);
      transform: translateX(-3px);
    }
    .article-title-header {
      flex: 1;
      font-size: 1rem;
      font-weight: 600;
      margin: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }
    .article-meta-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }
    .article-meta-header {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: .875rem;
      color: var(--muted);
    }
    .meta-item strong {
      color: var(--accent);
    }
    .doc {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 56px;
      box-shadow: var(--shadow);
      font-size: 1.0625rem;
      line-height: 1.8;
    }
    .doc h1 {
      font-size: 2rem;
      margin: 0 0 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--accent);
    }
    .doc h2 {
      font-size: 1.5rem;
      margin: 32px 0 16px;
      color: var(--accent);
    }
    .doc h3 {
      font-size: 1.25rem;
      margin: 24px 0 12px;
    }
    .doc p {
      margin: 0 0 16px;
    }
    .doc ul, .doc ol {
      margin: 0 0 16px;
      padding-left: 24px;
    }
    .doc li {
      margin: 8px 0;
    }
    .doc blockquote {
      margin: 16px 0;
      padding: 16px 20px;
      border-left: 4px solid var(--accent);
      background: var(--panel-2);
      border-radius: 0 8px 8px 0;
    }
    .doc a {
      color: var(--accent);
      text-decoration: none;
    }
    .doc a:hover {
      text-decoration: underline;
    }
    .doc code {
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: .9em;
    }
    .doc pre {
      background: var(--code-bg);
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      font-family: var(--font-mono);
      font-size: .9em;
    }
    .doc hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }
    .error-box {
      color: #ffb4b4;
      background: rgba(255,0,0,0.08);
      border: 1px solid rgba(255,0,0,0.18);
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 18px;
    }
    .loading {
      text-align: center;
      padding: 48px;
      color: var(--muted);
    }
    @media (max-width: 768px) {
      .header-inner { padding: 12px 16px; }
      .article-title-header { display: none; }
      .wrap { padding: 24px 16px 48px; }
      .doc { padding: 24px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a class="back-btn" href="archive.html">← 返回时间线</a>
      <h1 class="article-title-header" id="headerTitle">Loading...</h1>
    </div>
  </header>
  
  <div class="wrap">
    <div id="status"></div>
    <div id="metaCard"></div>
    <div class="doc" id="doc">
      <div class="loading">正在加载文章...</div>
    </div>
  </div>

  <script src="../js/runtime.js?v=1"></script>
  <script>
    // Simple markdown parser
    function parseMarkdown(md) {
      if (!md) return '';
      
      let html = md
        // Front matter - remove it
        .replace(/^---[\s\S]*?---\n*/, '')
        // Headers
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        // Bold and italic
        .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        // Code blocks
        .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        // Inline code
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        // Blockquotes
        .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
        // Links
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
        // Lists
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        // Wrap consecutive li in ul
        .replace(/(<li>.+<\/li>\n?)+/g, '<ul>$&</ul>')
        // Fix nested lists
        .replace(/<\/ul>\s*<ul>/g, '')
        // Horizontal rule
        .replace(/^---$/gm, '<hr>')
        // Paragraphs
        .replace(/\n\n/g, '</p><p>')
        // Line breaks
        .replace(/\n/g, '<br>');
      
      return '<p>' + html + '</p>';
    }
    
    async function loadArticle() {
      const urlParams = new URLSearchParams(window.location.search);
      const filename = urlParams.get('file');
      
      if (!filename) {
        document.getElementById('doc').innerHTML = '<div class="error-box">缺少文章参数</div>';
        return;
      }
      
      try {
        // Load article via API
        const res = await fetch(`/content/articles/${encodeURIComponent(filename)}`, { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const content = await res.text();
        
        // Parse front matter
        const frontMatterMatch = content.match(/^---\n([\s\S]*?)\n---/);
        const metadata = {};
        if (frontMatterMatch) {
          const frontMatter = frontMatterMatch[1];
          frontMatter.split('\n').forEach(line => {
            const match = line.match(/^(.+?):\s*["']?(.+?)["']?\s*$/);
            if (match) {
              metadata[match[1].trim()] = match[2].trim();
            }
          });
        }
        
        // Update header
        document.getElementById('headerTitle').textContent = metadata.title || filename;
        document.title = (metadata.title || filename) + ' - Selfware';
        
        // Build meta card
        const metaHtml = `
          <div class="article-meta-card">
            <div class="article-meta-header">
              ${metadata.date ? `<div class="meta-item"><strong>📅</strong> ${metadata.date}</div>` : ''}
              ${metadata.category ? `<div class="meta-item"><strong>🏷️</strong> ${metadata.category}</div>` : ''}
              ${metadata.total_articles ? `<div class="meta-item"><strong>📊</strong> ${metadata.total_articles} 条资讯</div>` : ''}
              ${metadata.source ? `<div class="meta-item"><strong>📡</strong> ${metadata.source}</div>` : ''}
            </div>
          </div>
        `;
        document.getElementById('metaCard').innerHTML = metaHtml;
        
        // Render content
        document.getElementById('doc').innerHTML = parseMarkdown(content);
        
      } catch (e) {
        document.getElementById('doc').innerHTML = '<div class="error-box">加载文章失败：' + e.message + '</div>';
        console.error(e);
      }
    }
    
    loadArticle();
  </script>
  <script src="../js/view-switcher.js?v=5"></script>
</body>
</html>
