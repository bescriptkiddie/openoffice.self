services:
  selfware:
    build: .
    container_name: selfware-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      # Persist content data across deployments
      - ./content:/app/content
    networks:
      - selfware-net

  nginx:
    image: nginx:alpine
    container_name: selfware-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment below for SSL (put certs in ./ssl/)
      # - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - selfware
    networks:
      - selfware-net

networks:
  selfware-net:
    driver: bridge
