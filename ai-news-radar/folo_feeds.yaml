# ========== Folo 订阅步骤 ==========
#
# 1. 打开 https://follow.is
# 2. 登录你的账号
# 3. 在搜索框输入公众号名称，如 "小互AI"
# 4. 点击「订阅」按钮
# 5. 进入「订阅管理」→ 找到该公众号 → 点击「RSS」图标
# 6. 复制 RSS 链接（格式：https://rsshub.app/folo/xxxxx）
# 7. 替换上面配置文件中的 url
# 8. 将 enabled: false 改为 enabled: true
#
# ========== 快捷方式 ==========
